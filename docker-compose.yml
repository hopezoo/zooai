# Docker Compose：全量服务（MySQL + Redis + 迁移 + 8 个业务后端 + 网关 + 前端 client/admin）
# 镜像约定：统一 zooai- 前缀。gateway hopezoo/zooai-gateway:linux-<版本>；biz 产品 hopezoo/zooai-<产品>:backend-<端>-linux-<版本>；aishop 前端 hopezoo/zooai-aishop:frontend-<端>-linux-<版本>；migrate hopezoo/zooai-migrate:linux-<版本>
# 使用前：
#   1. 复制 .env.example 为 .env 并填写 REGISTRY、VERSION、MYSQL_*、REDIS_*、JWT_* 等
#   2. 确保 configs/ 可访问：方式一）将项目 configs/ 复制到本目录（与 docker-compose.yml 同级）；方式二）在项目根目录执行 compose 时，../../configs 会指向项目 configs
# 启动：docker compose --env-file .env up -d（在 scripts/deploy/docker 或项目根执行皆可）
# 首次部署请先执行：docker compose run --rm migrate

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zooai}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ${REGISTRY:-hopezoo}/zooai-migrate:linux-${VERSION:-latest}
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
    volumes:
      - ../../configs:/configs:ro

  aitransfer-client:
    image: ${REGISTRY:-hopezoo}/zooai-aitransfer:backend-client-linux-${VERSION:-latest}
    ports:
      - "8101:8101"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aitransfer-admin:
    image: ${REGISTRY:-hopezoo}/zooai-aitransfer:backend-admin-linux-${VERSION:-latest}
    ports:
      - "8201:8201"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aimirror-client:
    image: ${REGISTRY:-hopezoo}/zooai-aimirror:backend-client-linux-${VERSION:-latest}
    ports:
      - "8102:8102"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aimirror-admin:
    image: ${REGISTRY:-hopezoo}/zooai-aimirror:backend-admin-linux-${VERSION:-latest}
    ports:
      - "8202:8202"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aigateway-client:
    image: ${REGISTRY:-hopezoo}/zooai-aigateway:backend-client-linux-${VERSION:-latest}
    ports:
      - "8103:8103"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aigateway-admin:
    image: ${REGISTRY:-hopezoo}/zooai-aigateway:backend-admin-linux-${VERSION:-latest}
    ports:
      - "8203:8203"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aishop-client:
    image: ${REGISTRY:-hopezoo}/zooai-aishop:backend-client-linux-${VERSION:-latest}
    ports:
      - "8104:8104"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  aishop-admin:
    image: ${REGISTRY:-hopezoo}/zooai-aishop:backend-admin-linux-${VERSION:-latest}
    ports:
      - "8204:8204"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      MYSQL_HOST: mysql:3306
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ../../configs:/configs:ro

  gateway:
    image: ${REGISTRY:-hopezoo}/zooai-gateway:linux-${VERSION:-latest}
    ports:
      - "8599:8599"
    depends_on:
      - aitransfer-client
      - aitransfer-admin
      - aimirror-client
      - aimirror-admin
      - aigateway-client
      - aigateway-admin
      - aishop-client
      - aishop-admin
    environment:
      AITRANSFER_CLIENT_URL: http://aitransfer-client:8101
      AITRANSFER_ADMIN_URL: http://aitransfer-admin:8201
      AIMIRROR_CLIENT_URL: http://aimirror-client:8102
      AIMIRROR_ADMIN_URL: http://aimirror-admin:8202
      AIGATEWAY_CLIENT_URL: http://aigateway-client:8103
      AIGATEWAY_ADMIN_URL: http://aigateway-admin:8203
      AISHOP_CLIENT_URL: http://aishop-client:8104
      AISHOP_ADMIN_URL: http://aishop-admin:8204
    volumes:
      - ../../configs:/configs:ro

  frontend-client:
    image: ${REGISTRY:-hopezoo}/zooai-aishop:frontend-client-linux-${VERSION:-latest}
    ports:
      - "8700:80"
    depends_on:
      - gateway

  frontend-admin:
    image: ${REGISTRY:-hopezoo}/zooai-aishop:frontend-admin-linux-${VERSION:-latest}
    ports:
      - "8701:80"
    depends_on:
      - gateway

volumes:
  mysql_data:
  redis_data:
